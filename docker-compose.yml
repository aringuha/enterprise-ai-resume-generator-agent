services:
  ollama:
    image: ollama/ollama:latest
    container_name: enterprise_resume_ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5

  ollama-pull:
    image: ollama/ollama:latest
    container_name: enterprise_resume_ollama_pull
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull $$OLLAMA_MODEL"]
    restart: "no"

  api:
    build: .
    container_name: enterprise_resume_api_crewai
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build: .
    container_name: enterprise_resume_streamlit_crewai
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - FASTAPI_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama_models:
